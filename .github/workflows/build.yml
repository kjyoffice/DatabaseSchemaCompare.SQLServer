name: Build App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release --no-restore -o publish

      - name: Set Version
        shell: pwsh
        run: |
            $dateX = Get-Date -Format "yyyy-MM-dd"
            $versionX = "${dateX}_${{ github.run_number }}"
            echo "APP_VERSION=$versionX" >> $env:GITHUB_ENV 

      - name: Zip Publish Files
        shell: pwsh
        run: |
            Compress-Archive -Path publish/* -DestinationPath "DatabaseSchemaCompare.SQLServer_$env:APP_VERSION.zip"

      - name: Upload Build
        uses: actions/upload-artifact@v5
        with:
          name: DatabaseSchemaCompare.SQLServer_${{ env.APP_VERSION }}
          path: DatabaseSchemaCompare.SQLServer_${{ env.APP_VERSION }}.zip


